name: Feature request
description: Suggest a capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point is this solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should A11yAgent do?
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      multiple: true
      options:
        - CLI
        - MCP
        - GitHub Action
        - Demo site
        - New framework patcher
        - Reporting / output format
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
