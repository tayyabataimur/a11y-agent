name: Loop11y
description: Run accessibility audits on URLs or repos and post results to PRs
author: tayyabataimur
branding:
  icon: eye
  color: purple

inputs:
  url:
    description: URL to audit (omit to audit repo)
    required: false
  repo-path:
    description: Repo path to audit (defaults to workspace)
    required: false
    default: "."
  max-files:
    description: Max files to scan in repo mode
    required: false
    default: "50"
  fail-under:
    description: Fail job if score below this threshold (0-100)
    required: false
    default: "0"
  comment-on-pr:
    description: Post results as PR comment
    required: false
    default: "true"
  github-token:
    description: GitHub token for PR comments
    required: false
    default: ${{ github.token }}

outputs:
  score:
    description: Accessibility score (0-100)
    value: ${{ steps.run.outputs.score }}
  grade:
    description: Letter grade (A-F)
    value: ${{ steps.run.outputs.grade }}
  report-path:
    description: Path to generated report
    value: ${{ steps.run.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # Build loop11y from the checked-out action ref. The consumer pins the
    # version via `uses: tayyabataimur/loop11y@<tag-or-sha>` — this step builds
    # exactly that ref. No reliance on `loop11y@latest` from npm.
    - name: Build Loop11y from action ref
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      run: |
        set -e
        npm ci --ignore-scripts
        npm run build

    - name: Install Playwright Chromium
      shell: bash
      run: npx --prefix "${{ github.action_path }}" playwright install chromium --with-deps

    - name: Run audit
      id: run
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_REPO_PATH: ${{ inputs.repo-path }}
        INPUT_MAX_FILES: ${{ inputs.max-files }}
        INPUT_FAIL_UNDER: ${{ inputs.fail-under }}
        LOOP11Y_BIN: ${{ github.action_path }}/dist/index.js
      run: |
        set -e
        REPORT_PATH="${{ runner.temp }}/a11y-report.json"
        MD_PATH="${{ runner.temp }}/a11y-report.md"
        if [ -n "$INPUT_URL" ]; then
          node "$LOOP11Y_BIN" audit "$INPUT_URL" --output "$REPORT_PATH"
          node "$LOOP11Y_BIN" audit "$INPUT_URL" --markdown --output "$MD_PATH"
        else
          node "$LOOP11Y_BIN" audit:repo "$INPUT_REPO_PATH" --max-files "$INPUT_MAX_FILES" --output "$REPORT_PATH"
          node "$LOOP11Y_BIN" audit:repo "$INPUT_REPO_PATH" --max-files "$INPUT_MAX_FILES" --markdown --output "$MD_PATH"
        fi
        SCORE=$(node -e "const r=require('$REPORT_PATH');console.log(r.score ?? r.summary?.score ?? 0)")
        GRADE=$(node -e "const r=require('$REPORT_PATH');console.log(r.grade ?? r.summary?.grade ?? 'F')")
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
        echo "report-path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        echo "md-path=$MD_PATH" >> "$GITHUB_OUTPUT"
        if [ "$INPUT_FAIL_UNDER" -gt 0 ] && [ "${SCORE%.*}" -lt "$INPUT_FAIL_UNDER" ]; then
          echo "::error::Accessibility score $SCORE below threshold $INPUT_FAIL_UNDER"
          exit 1
        fi

    - name: Comment on PR
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        MD_PATH: ${{ steps.run.outputs.md-path }}
        SCORE: ${{ steps.run.outputs.score }}
        GRADE: ${{ steps.run.outputs.grade }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const md = fs.readFileSync(process.env.MD_PATH, 'utf8');
          const body = `## Loop11y Report\n\n**Score:** ${process.env.SCORE} | **Grade:** ${process.env.GRADE}\n\n<details><summary>Full report</summary>\n\n${md}\n\n</details>`;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });
